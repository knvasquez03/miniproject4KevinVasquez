<!DOCTYPE html>
<html lang="en">
<head>
    <title>PocketLedger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">PocketLedger</a>
        <div>
            <a class="btn btn-light btn-sm" href="/">Home</a>
            <a class="btn btn-light btn-sm" href="/dashboard/">Dashboard</a>
            <a class="btn btn-light btn-sm" href="/add/">Add Expense</a>
            <a class="btn btn-light btn-sm" href="/categories/">Categories</a>
            <a class="btn btn-light btn-sm" href="/summary/">Summary</a>
            <a class="btn btn-light btn-sm" href="/profile/">Profile</a>
            <a class="btn btn-light btn-sm" href="/admin/">Admin</a>

            {% if user.is_authenticated %}
                <a class="btn btn-warning btn-sm" href="/accounts/logout/">Logout</a>
            {% else %}
                <a class="btn btn-success btn-sm" href="/register/">Register</a>
                <a class="btn btn-primary btn-sm" href="/accounts/login/">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
